<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regularization</title>
  <style>
    :root {
      --panel: rgba(15, 23, 42, 0.76);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --border: rgba(148, 163, 184, 0.12);
      --text: #e7eef9;
      --muted: #9aacbf;
      --accent: #60c7ff;
      --red: #fca5a5;
      --green: #86efac;
      --shadow: 0 24px 60px rgba(2, 6, 23, 0.34);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 199, 255, 0.14), transparent 24%),
        linear-gradient(180deg, #09111f 0%, #020817 100%);
    }
    button { font: inherit; }
    .app { min-height: 100vh; padding: 24px 16px 40px; }
    .shell { max-width: 1120px; margin: 0 auto; }
    .nav {
      position: sticky;
      top: 12px;
      z-index: 20;
      border: 1px solid var(--border);
      background: rgba(9, 17, 31, 0.84);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .nav-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      align-self: flex-start;
    }
    .tabs-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .tabs {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
      max-width: 100%;
    }
    .tab {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: opacity 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }
    .tab.active {
      background: var(--accent);
      color: #06111e;
      border-color: transparent;
      font-weight: 700;
    }
    .theme-btn {
      margin-top: 18px;
      margin-left: auto;
      width: fit-content;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .view {
      max-width: 900px;
      min-height: calc(100vh - 170px);
      margin: 28px auto 0;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 34px;
      padding: 42px 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      animation: fadeUp 0.22s ease;
    }
    .title {
      margin: 0;
      color: var(--accent);
      font-size: clamp(38px, 6vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }
    .subtitle {
      margin: 18px 0 0;
      font-size: 28px;
      line-height: 1.15;
      color: white;
    }
    .lead {
      max-width: 760px;
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: 17px;
    }
    .stack { display: grid; gap: 34px; margin-top: 38px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .soft-block, .card, .example-row {
      background: var(--panel-soft);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 24px;
      min-height: 100%;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.16);
    }
    .soft-block h3, .card h3, .example-row h3 { margin: 0; font-size: 20px; }
    .soft-block p, .card p, .example-row p, .soft-block li {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
      white-space: pre-line;
    }
    .soft-block ul { margin: 12px 0 0; padding-left: 0; list-style: none; }
    .italic-note {
      margin-top: 16px;
      color: #94a3b8;
      font-size: 14px;
      font-style: italic;
      line-height: 1.8;
    }
    .compare {
      border: 1px solid var(--border);
      background: rgba(5, 10, 22, 0.34);
      border-radius: 24px;
      padding: 24px;
      min-height: 100%;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.16);
    }
    .compare h3 { margin: 0; font-size: 22px; }
    .compare p { margin: 12px 0 0; color: var(--muted); line-height: 1.8; }
    .chart-shell {
      border: 1px solid var(--border);
      background: rgba(5, 10, 22, 0.34);
      border-radius: 28px;
      padding: 22px;
    }
    .chart-shell h3 { margin: 0; font-size: 20px; }
    .chart-shell p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .pill {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: opacity 180ms ease, background-color 180ms ease, color 180ms ease, border-color 180ms ease;
    }
    .pill.active {
      background: var(--accent);
      color: #06111e;
      border-color: transparent;
      font-weight: 700;
    }
    .info-box {
      margin-top: 18px;
      border: 1px solid var(--border);
      background: rgba(5, 10, 22, 0.34);
      border-radius: 24px;
      padding: 22px;
    }
    .info-box h3 { margin: 0; font-size: 20px; }
    .info-box p { margin: 12px 0 0; line-height: 1.8; }
    .instruction { margin-top: 20px; color: var(--muted); font-size: 14px; }
    .table-wrap {
      overflow: auto;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }
    th { color: #dce8f7; font-size: 14px; }
    td { color: var(--muted); font-size: 14px; line-height: 1.7; }
    td:first-child { color: white; font-weight: 700; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    canvas { width: 100%; display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 860px) {
      .view { padding: 28px 20px; }
      .grid-2 { grid-template-columns: 1fr; }
      .nav-row { align-items: flex-start; }
      .brand { font-size: 24px; }
      .subtitle { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="nav">
        <div class="nav-row">
          <div class="brand">Regularization</div>
          <div class="tabs-wrapper">
            <nav class="tabs" id="tabs"></nav>
          </div>
        </div>
      </header>
      <main id="view" class="view"></main>
    </div>
  </div>

  <script>
    const tabs = [
      { id: "simply-explained", label: "Simply Explained" },
      { id: "intuition", label: "Intuition" },
      { id: "regression", label: "Regression" },
      { id: "methods", label: "Methods" },
      { id: "modern", label: "Modern Use" },
      { id: "ai-usage", label: "AI Usage" }
    ];

    const intuitionModes = [
      {
        label: "Underfit",
        title: "Underfit",
        text: "Too simple. The model misses the real pattern in the data."
      },
      {
        label: "Good Fit",
        title: "Good Fit",
        text: "Captures the real pattern without chasing noise."
      },
      {
        label: "Overfit",
        title: "Overfit",
        text: "Too complex. The model follows noise instead of the true signal."
      }
    ];

    const heroData = [
      { x: 0.6, observed: 2.3, underfit: 3.08, goodFit: 2.25, overfit: 2.28 },
      { x: 1.2, observed: 2.95, underfit: 3.34, goodFit: 2.88, overfit: 2.94 },
      { x: 1.9, observed: 4.55, underfit: 3.66, goodFit: 4.18, overfit: 4.52 },
      { x: 2.5, observed: 4.12, underfit: 3.93, goodFit: 4.48, overfit: 4.11 },
      { x: 3.2, observed: 5.72, underfit: 4.25, goodFit: 5.53, overfit: 5.69 },
      { x: 3.9, observed: 5.08, underfit: 4.57, goodFit: 5.32, overfit: 5.1 },
      { x: 4.5, observed: 6.62, underfit: 4.84, goodFit: 6.28, overfit: 6.58 },
      { x: 5.1, observed: 5.6, underfit: 5.12, goodFit: 5.96, overfit: 5.63 },
      { x: 5.8, observed: 6.18, underfit: 5.43, goodFit: 6.14, overfit: 6.16 },
      { x: 6.4, observed: 5.32, underfit: 5.71, goodFit: 5.44, overfit: 5.34 }
    ];

    const tabsEl = document.getElementById("tabs");
    const viewEl = document.getElementById("view");

    let activeTab = "simply-explained";
    let activeIntuitionMode = 1;
    let activeMethod = "ridge";
    let activeAIUsage = "concept-simplification";

    const methodsData = {
      ridge: {
        title: "Ridge",
        what: "Shrinks all coefficients but keeps them in the model.",
        best: "Features are highly correlated and you want to keep all of them while making the model more stable.",
        pros: ["Reduces instability from correlated features", "Keeps all information in the model"],
        cons: ["Does not remove unimportant features", "Harder to interpret"],
        example: "Predicting house prices where many features overlap in information."
      },
      lasso: {
        title: "Lasso",
        what: "Removes features by pushing some coefficients to zero.",
        best: "You want a simpler model and need to identify the most important features.",
        pros: ["Performs automatic feature selection", "Easier to interpret"],
        cons: ["Can be unstable when features are correlated", "May drop useful variables"],
        example: "Medical data where only a few variables matter."
      },
      "elastic-net": {
        title: "Elastic Net",
        what: "Combines shrinking and feature removal.",
        best: "Features are correlated but you still want feature selection.",
        pros: ["More stable than Lasso", "Can still remove unimportant features"],
        cons: ["More parameters to tune", "Slightly more complex"],
        example: "Text data where many features are related."
      },
      "early-stopping": {
        title: "Early Stopping",
        what: "Stops training before the model starts overfitting.",
        best: "Models are trained step by step, like neural networks.",
        pros: ["Simple and effective", "Prevents overfitting early"],
        cons: ["Requires monitoring", "Depends on stopping point"],
        example: "Training a neural network and stopping when validation stops improving."
      },
      "svd-pca": {
        title: "SVD / PCA",
        what: "Reduces features by keeping only the strongest patterns.",
        best: "Data has many correlated features and you want to simplify it.",
        pros: ["Reduces noise", "Improves stability"],
        cons: ["Harder to interpret", "Loses some information"],
        example: "Compressing user data into a few key patterns."
      }
    };

    const aiUsageData = {
      "concept-simplification": {
        title: "Concept simplification",
        description: "AI was used to translate technical concepts into simple, intuitive explanations and analogies.",
        prompt: "Explain regularization in the simplest way possible. Avoid math and focus on intuition. Use a real-life analogy, like studying for a test, to explain overfitting vs generalization."
      },
      "ui-ux-design": {
        title: "UI / UX design",
        description: "AI helped improve layout decisions, remove unnecessary components, and simplify interactions.",
        prompt: "I have a tab with underfit, good fit, and overfit. The current slider feels unnecessary. Suggest a cleaner UI where users can switch between the three states and clearly see the difference visually."
      },
      "content-refinement": {
        title: "Content refinement",
        description: "AI was used to rewrite and tighten explanations to make them clearer and easier to understand.",
        prompt: 'Rewrite this explanation so it is simpler, clearer, and more intuitive:\n"Regularization adds a penalty to model complexity to improve generalization."\nKeep it short and understandable for someone seeing this for the first time.'
      },
      "real-world-examples": {
        title: "Real-world examples",
        description: "AI helped generate practical examples showing how regularization applies in real scenarios.",
        prompt: "Give simple real-world examples of regularization in finance, Spotify music recommendations, and medicine. Focus on what goes wrong with overfitting and how regularization fixes it."
      },
      "code-debugging": {
        title: "Code and debugging",
        description: "AI assisted with layout fixes and front-end improvements during development.",
        prompt: "Fix this layout issue: the navigation tabs are not centered. Use flexbox to center them horizontally without affecting the title alignment. Avoid using margin hacks."
      }
    };

    function renderTabs() {
      tabsEl.innerHTML = "";
      tabs.forEach((tab) => {
        const btn = document.createElement("button");
        btn.className = "tab" + (tab.id === activeTab ? " active" : "");
        btn.textContent = tab.label;
        btn.addEventListener("click", () => {
          activeTab = tab.id;
          renderTabs();
          renderView();
        });
        tabsEl.appendChild(btn);
      });
    }

    function renderSimplyExplained() {
      viewEl.innerHTML = `
        <h1 class="title">Simply Explained</h1>
        <h2 class="subtitle">Regularization keeps models under control</h2>
        <p class="lead">A model can fit training data too closely and start learning noise instead of real patterns. Regularization adds a small cost for complexity, controlled by a parameter called λ, so the model stays useful on new data.</p>
        <div class="stack">
          <div class="grid-2">
            <div class="soft-block">
              <h3>What it means</h3>
              <p>Forces the model to stay simple so it works on new data, not just the training data. Like a student studying for a test, it’s better to learn concepts that apply to all problems rather than memorize specific questions and hope they appear again.</p>
            </div>
            <div class="soft-block">
              <h3>What λ does</h3>
              <p>Small λ → model fits everything, including noise
Balanced λ → captures real patterns and generalizes well
Large λ → model is too simple and misses patterns</p>
              <p class="italic-note">Like studying: too little control leads to memorizing everything, while the right balance leads to real understanding.</p>
            </div>
            <div class="soft-block">
              <h3>Why that helps</h3>
              <p>Complex models often learn noise in the training data, which leads to mistakes on new data. Simpler models focus on real patterns, so they generalize better and perform more reliably.</p>
            </div>
            <div class="soft-block">
              <h3>Simple rule</h3>
              <p>Don’t memorize the data. Learn patterns that work on new data.</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderIntuition() {
      viewEl.innerHTML = `
        <h1 class="title">Graphic Intuition</h1>
        <p class="lead">The same data can lead to very different models. The goal is to capture the real pattern without learning the noise.</p>
        <div class="stack">
          <div class="chart-shell">
            <div style="margin-top:4px;"><canvas id="heroCanvas" width="760" height="360"></canvas></div>
          </div>
          <p class="instruction">Select a model to see how it behaves.</p>
          <div class="pills">
            ${intuitionModes.map((mode, index) => `<button class="pill${index === activeIntuitionMode ? " active" : ""}" data-mode="${index}">${mode.label}</button>`).join("")}
          </div>
          <div class="info-box">
            <h3 style="color:${activeIntuitionMode === 1 ? "var(--green)" : "var(--red)"}">${intuitionModes[activeIntuitionMode].title}</h3>
            <p style="color:${activeIntuitionMode === 1 ? "var(--green)" : "var(--red)"}">${intuitionModes[activeIntuitionMode].text}</p>
          </div>
        </div>
      `;

      document.querySelectorAll("[data-mode]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeIntuitionMode = Number(btn.dataset.mode);
          renderView();
        });
      });
      drawHeroChart(document.getElementById("heroCanvas"), activeIntuitionMode);
    }

    function renderRegression() {
      viewEl.innerHTML = `
        <h1 class="title">Regression</h1>
        <h2 class="subtitle">Regularization changes how regression behaves</h2>
        <p class="lead">Ordinary regression focuses only on fitting the training data. This can lead to unstable models, especially when features are noisy or correlated. Regularization adds a small constraint that keeps the model more stable and reliable on new data.</p>
        <div class="stack">
          <div class="card">
            <div class="grid-2">
              <div class="compare">
                <h3>No regularization</h3>
                <div style="margin-top:16px;">
                  <svg viewBox="0 0 560 220" style="width:100%;height:auto;" aria-label="No regularization regression comparison">
                    <rect x="0" y="0" width="560" height="220" rx="20" fill="rgba(15,23,42,0.48)"></rect>
                    <g stroke="rgba(148,163,184,0.15)" stroke-width="1">
                      <line x1="26" y1="184" x2="534" y2="184"></line>
                      <line x1="26" y1="28" x2="26" y2="184"></line>
                      <line x1="26" y1="145" x2="534" y2="145"></line>
                      <line x1="26" y1="106" x2="534" y2="106"></line>
                      <line x1="26" y1="67" x2="534" y2="67"></line>
                    </g>
                    <path d="M 26 172 C 52 150, 66 116, 90 112 C 116 108, 138 188, 162 184 C 186 180, 208 48, 234 42 C 258 36, 280 136, 304 138 C 330 140, 352 18, 376 16 C 402 14, 424 108, 448 112 C 474 116, 502 54, 534 78" fill="none" stroke="#fca5a5" stroke-width="4" stroke-linecap="round"></path>
                    ${heroDots()}
                  </svg>
                </div>
                <p>Overfits noise</p>
              </div>
              <div class="compare">
                <h3>With regularization</h3>
                <div style="margin-top:16px;">
                  <svg viewBox="0 0 560 220" style="width:100%;height:auto;" aria-label="With regularization regression comparison">
                    <rect x="0" y="0" width="560" height="220" rx="20" fill="rgba(15,23,42,0.48)"></rect>
                    <g stroke="rgba(148,163,184,0.15)" stroke-width="1">
                      <line x1="26" y1="184" x2="534" y2="184"></line>
                      <line x1="26" y1="28" x2="26" y2="184"></line>
                      <line x1="26" y1="145" x2="534" y2="145"></line>
                      <line x1="26" y1="106" x2="534" y2="106"></line>
                      <line x1="26" y1="67" x2="534" y2="67"></line>
                    </g>
                    <path d="M 26 176 C 92 158, 144 112, 198 92 C 252 72, 308 50, 364 50 C 420 50, 478 70, 534 102" fill="none" stroke="#60c7ff" stroke-width="4" stroke-linecap="round"></path>
                    ${heroDots()}
                  </svg>
                </div>
                <p>More stable on new data</p>
              </div>
            </div>
          </div>
          <div class="grid-2">
            <div class="compare">
              <h3 style="color:var(--red)">Without regularization</h3>
              <p>Coefficients can become large and unstable.</p>
            </div>
            <div class="compare">
              <h3 style="color:var(--green)">With regularization</h3>
              <p>Coefficients stay smaller and more stable.</p>
            </div>
          </div>
          <p class="lead" style="margin-top:0; color:#d8e5f6;">You trade a little flexibility for a model that works better on new data.</p>
        </div>
      `;
    }

    function heroDots() {
      return heroData.map((point) => {
        const cx = 26 + ((point.x - 0.6) / (6.4 - 0.6)) * 508;
        const cy = 184 - ((point.observed - 2.3) / (6.62 - 2.3)) * 150;
        return `<circle cx="${cx}" cy="${cy}" r="4.5" fill="#e5e7eb" stroke="#ffffff" stroke-width="1.2"></circle>`;
      }).join("");
    }

    function renderMethods() {
      const active = methodsData[activeMethod];
      viewEl.innerHTML = `
        <h1 class="title">Methods</h1>
        <p class="lead">Different methods control model complexity in different ways.</p>
        <div class="stack">
          <div class="pills" style="margin-top:0;">
            ${[
              ["ridge", "Ridge"],
              ["lasso", "Lasso"],
              ["elastic-net", "Elastic Net"],
              ["early-stopping", "Early Stopping"],
              ["svd-pca", "SVD / PCA"]
            ].map(([id, label]) => `<button class="pill${activeMethod === id ? " active" : ""}" data-method="${id}">${label}</button>`).join("")}
          </div>
          <div class="card">
            <h2 class="subtitle" style="font-size:30px;margin-top:0;">${active.title}</h2>
            <div class="stack" style="gap:20px;margin-top:26px;">
              <div>
                <h3 style="font-size:16px;">What it does</h3>
                <p>${active.what}</p>
              </div>
              <div>
                <h3 style="font-size:16px;">Best when</h3>
                <p>${active.best}</p>
              </div>
              <div>
                <h3 style="font-size:16px;">Pros</h3>
                <p>• ${active.pros[0]}<br />• ${active.pros[1]}</p>
              </div>
              <div>
                <h3 style="font-size:16px;">Cons</h3>
                <p>• ${active.cons[0]}<br />• ${active.cons[1]}</p>
              </div>
              <div>
                <h3 style="font-size:16px;">Simple example</h3>
                <p>${active.example}</p>
              </div>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll("[data-method]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeMethod = btn.dataset.method;
          renderView();
        });
      });
    }

    function renderModern() {
      viewEl.innerHTML = `
        <h1 class="title">Modern Use</h1>
        <p class="lead">Regularization is used everywhere in modern machine learning. The exact method depends on the model, but the goal is always the same: prevent overfitting.</p>
        <div class="stack">
          <div class="example-row">
            <h3>Finance: predicting market risk</h3>
            <p>A model is used to predict risk from past market data.
Overfitting causes it to react to random fluctuations, while underfitting misses real patterns.
Regularization helps the model focus on stable trends and make more reliable predictions.</p>
          </div>
          <div class="example-row">
            <h3>Recommendations: Spotify music discovery</h3>
            <p>A user wants to discover new music based on their taste.
Overfitting leads to repeated or very similar songs, while underfitting leads to irrelevant recommendations.
Regularization helps the model learn general taste and suggest new, relevant music.</p>
          </div>
          <div class="example-row">
            <h3>Medicine: disease prediction</h3>
            <p>A patient is tested for heart disease risk using a model.
Overfitting can lead to false positives or false negatives by reacting to noise in past data.
Underfitting can miss important risk factors.
Regularization helps the model focus on real signals and make more reliable predictions.</p>
          </div>
          <p class="lead" style="margin-top:6px; color:#d8e5f6;">Different problems need different tools. The goal is always the same: keep the model from learning noise.</p>
        </div>
      `;
    }

    function renderAIUsage() {
      const active = aiUsageData[activeAIUsage];
      viewEl.innerHTML = `
        <h1 class="title">AI Usage</h1>
        <p class="lead">AI was used as a tool to assist in building this project. It helped with simplifying concepts, improving design, refining explanations, and fixing code. The final structure, decisions, and content were guided and selected by us.</p>
        <div class="stack">
          <div class="pills" style="margin-top:0;">
            ${[
              ["concept-simplification", "Concept simplification"],
              ["ui-ux-design", "UI / UX design"],
              ["content-refinement", "Content refinement"],
              ["real-world-examples", "Real-world examples"],
              ["code-debugging", "Code and debugging"]
            ].map(([id, label]) => `<button class="pill${activeAIUsage === id ? " active" : ""}" data-ai-usage="${id}">${label}</button>`).join("")}
          </div>
          <div class="card">
            <h2 class="subtitle" style="font-size:30px;margin-top:0;">${active.title}</h2>
            <div class="stack" style="gap:20px;margin-top:26px;">
              <div>
                <h3 style="font-size:16px;">Description</h3>
                <p>${active.description}</p>
              </div>
              <div>
                <h3 style="font-size:16px;">Prompt</h3>
                <div style="margin-top:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:20px;padding:16px 18px;color:var(--muted);font: 14px/1.8 ui-monospace, SFMono-Regular, Menlo, monospace;white-space:pre-line;">${active.prompt}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll("[data-ai-usage]").forEach((btn) => {
        btn.addEventListener("click", () => {
          activeAIUsage = btn.dataset.aiUsage;
          renderView();
        });
      });
    }

    function renderView() {
      if (activeTab === "simply-explained") renderSimplyExplained();
      if (activeTab === "intuition") renderIntuition();
      if (activeTab === "regression") renderRegression();
      if (activeTab === "methods") renderMethods();
      if (activeTab === "modern") renderModern();
      if (activeTab === "ai-usage") renderAIUsage();
    }

    function drawHeroChart(canvas, modeIndex) {
      const ctx = canvas.getContext("2d");
      const { width, height } = canvas;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#071120";
      ctx.fillRect(0, 0, width, height);

      const padding = { top: 24, right: 24, bottom: 58, left: 52 };
      const innerW = width - padding.left - padding.right;
      const innerH = height - padding.top - padding.bottom;
      const minX = 0.4, maxX = 6.6, minY = 1.6, maxY = 7.0;
      const px = (x) => padding.left + ((x - minX) / (maxX - minX)) * innerW;
      const py = (y) => padding.top + (1 - (y - minY) / (maxY - minY)) * innerH;

      ctx.strokeStyle = "rgba(148,163,184,0.18)";
      [2, 3, 4, 5, 6].forEach((y) => {
        ctx.beginPath();
        ctx.moveTo(padding.left, py(y));
        ctx.lineTo(width - padding.right, py(y));
        ctx.stroke();
      });
      [1, 2, 3, 4, 5, 6].forEach((x) => {
        ctx.beginPath();
        ctx.moveTo(px(x), padding.top);
        ctx.lineTo(px(x), height - padding.bottom);
        ctx.stroke();
      });

      ctx.strokeStyle = "rgba(148,163,184,0.45)";
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.stroke();

      ctx.fillStyle = "#9aacbf";
      ctx.font = "12px Inter";
      ctx.fillText("Predicted outcome", 6, 16);
      ctx.fillText("Feature value", width - 110, height - 12);

      const lines = [
        { key: "underfit", color: "#fb923c" },
        { key: "goodFit", color: "#60c7ff" },
        { key: "overfit", color: "#34d399" }
      ];

      lines.forEach((line, index) => {
        ctx.beginPath();
        heroData.forEach((point, pointIndex) => {
          const x = px(point.x);
          const y = py(point[line.key]);
          if (pointIndex === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = line.color;
        ctx.globalAlpha = modeIndex === index ? 1 : 0.26;
        ctx.lineWidth = line.key === "goodFit" ? 4 : 3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      });

      heroData.forEach((point) => {
        ctx.beginPath();
        ctx.arc(px(point.x), py(point.observed), 4.5, 0, Math.PI * 2);
        ctx.fillStyle = "#e5e7eb";
        ctx.fill();
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1.2;
        ctx.stroke();
      });
    }

    renderTabs();
    renderView();
  </script>
</body>
</html>
